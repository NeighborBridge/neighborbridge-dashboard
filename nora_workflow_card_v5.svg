<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1080 900" width="1080" height="900" xmlns="http://www.w3.org/2000/svg" style="font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f7fb;">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#64748b"/>
    </marker>
    <marker id="ad" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 0L5 10z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1080" height="900" fill="#f4f7fb" rx="8"/>

  <!-- Title -->
  <text x="30" y="35" font-size="18" font-weight="700" fill="#0f172a">FASD/NDD Diagnostic Readiness — Community Entry-Point Workflow</text>
  <text x="30" y="53" font-size="11" fill="#64748b" font-style="italic">Internal concept for Holly / FQHC alignment discussion — not sent / not approved</text>

  <!-- Status badges -->
  <rect x="30" y="63" width="80" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="70" y="77" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Internal Draft</text>
  <rect x="118" y="63" width="66" height="20" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.5"/>
  <text x="151" y="77" font-size="9" font-weight="700" fill="#4338ca" text-anchor="middle">Non-PHI</text>
  <rect x="192" y="63" width="140" height="20" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="262" y="77" font-size="9" font-weight="700" fill="#475569" text-anchor="middle">Not for external distribution</text>
  <rect x="340" y="63" width="130" height="20" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="405" y="77" font-size="9" font-weight="700" fill="#475569" text-anchor="middle">No referral pathway implied</text>

  <!-- ========================================== -->
  <!-- BAND 1: Community Entry Points -->
  <!-- ========================================== -->
  <text x="30" y="112" font-size="13" font-weight="700" fill="#334155">Band 1 — Community Entry Points</text>

  <!-- Entry point headers -->
  <rect x="30" y="125" width="185" height="45" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="122" y="144" font-size="14" font-weight="650" fill="#1e293b" text-anchor="middle">1. WIC</text>
  <text x="122" y="161" font-size="10" fill="#475569" text-anchor="middle">Entry point</text>

  <rect x="230" y="125" width="185" height="45" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="322" y="144" font-size="14" font-weight="650" fill="#1e293b" text-anchor="middle">2. Public Health</text>
  <text x="322" y="161" font-size="10" fill="#475569" text-anchor="middle">Health Department</text>

  <rect x="430" y="125" width="185" height="45" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="522" y="144" font-size="14" font-weight="650" fill="#1e293b" text-anchor="middle">3. School Team</text>
  <text x="522" y="161" font-size="10" fill="#475569" text-anchor="middle">Nurse / counselor / EC teacher</text>

  <rect x="630" y="125" width="185" height="45" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="722" y="144" font-size="14" font-weight="650" fill="#1e293b" text-anchor="middle">4. Pediatric PCP</text>
  <text x="722" y="161" font-size="10" fill="#475569" text-anchor="middle">Medical home</text>

  <rect x="830" y="125" width="185" height="45" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="922" y="144" font-size="14" font-weight="650" fill="#1e293b" text-anchor="middle">5. CHW / Navigator</text>
  <text x="922" y="161" font-size="10" fill="#475569" text-anchor="middle">Pending approval</text>

  <!-- Down arrows -->
  <path d="M122 170L122 195" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M322 170L322 195" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M522 170L522 195" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M722 170L722 195" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M922 170L922 195" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>

  <path d="M30 200L1050 200" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 4" fill="none"/>

  <!-- ========================================== -->
  <!-- BAND 2: Connector Actions -->
  <!-- ========================================== -->
  <text x="30" y="218" font-size="13" font-weight="700" fill="#334155">Band 2 — Connector Actions</text>

  <!-- WIC connector -->
  <rect x="30" y="230" width="185" height="55" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <text x="122" y="249" font-size="11" font-weight="650" fill="#1e293b" text-anchor="middle">Notices concern</text>
  <text x="122" y="264" font-size="10" fill="#475569" text-anchor="middle">Provides family education</text>
  <text x="122" y="277" font-size="9" fill="#64748b" text-anchor="middle">Encourages PCP discussion</text>

  <!-- PH connector -->
  <rect x="230" y="230" width="185" height="55" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <text x="322" y="249" font-size="11" font-weight="650" fill="#1e293b" text-anchor="middle">Notices support concern</text>
  <text x="322" y="264" font-size="10" fill="#475569" text-anchor="middle">Helps identify records</text>
  <text x="322" y="277" font-size="9" fill="#64748b" text-anchor="middle">Encourages medical home</text>

  <!-- School connector -->
  <rect x="430" y="230" width="185" height="55" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <text x="522" y="249" font-size="11" font-weight="650" fill="#1e293b" text-anchor="middle">Notices school concern</text>
  <text x="522" y="264" font-size="10" fill="#475569" text-anchor="middle">Suggests PCP discussion</text>
  <text x="522" y="277" font-size="9" fill="#64748b" text-anchor="middle">Gather IEP / school records</text>

  <!-- PCP connector (wider role) -->
  <rect x="630" y="230" width="185" height="55" rx="6" fill="#a7f3d0" stroke="#34d399" stroke-width="1.2"/>
  <text x="722" y="249" font-size="11" font-weight="650" fill="#1e293b" text-anchor="middle">Reviews concern</text>
  <text x="722" y="264" font-size="10" fill="#475569" text-anchor="middle">Reviews records</text>
  <text x="722" y="277" font-size="9" fill="#64748b" text-anchor="middle">Determines next step</text>

  <!-- CHW connector (dashed) -->
  <rect x="830" y="230" width="185" height="55" rx="6" fill="#fce7f3" stroke="#f472b6" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="922" y="249" font-size="11" font-weight="650" fill="#1e293b" text-anchor="middle">Helps family understand</text>
  <text x="922" y="264" font-size="10" fill="#475569" text-anchor="middle">Gathers records</text>
  <text x="922" y="277" font-size="9" fill="#64748b" text-anchor="middle">Prepares questions</text>

  <!-- Boundary note per connector -->
  <rect x="30" y="290" width="980" height="16" rx="3" fill="#fef2f2"/>
  <text x="40" y="302" font-size="9" fill="#991b1b">No diagnosis · No referral pathway · No clinical evaluation at connector level. PCP is the clinical gatekeeper.</text>

  <!-- Down arrows -->
  <path d="M122 285L122 310" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M322 285L322 310" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M522 285L522 310" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M722 285L722 310" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M922 285L922 310" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>

  <!-- Converge arrows into center -->
  <path d="M122 315L430 315" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M322 315L430 315" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M722 315L430 315" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M922 315L430 315" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M430 315L430 330" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>

  <path d="M30 340L1050 340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 4" fill="none"/>

  <!-- ========================================== -->
  <!-- BAND 3: Family Readiness -->
  <!-- ========================================== -->
  <text x="30" y="358" font-size="13" font-weight="700" fill="#334155">Band 3 — Family Readiness</text>

  <rect x="30" y="370" width="560" height="60" rx="8" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.2"/>
  <text x="310" y="392" font-size="15" font-weight="650" fill="#1e293b" text-anchor="middle">Family Readiness Preparation</text>
  <text x="310" y="410" font-size="12" fill="#475569" text-anchor="middle">Family gathers records · Prepares questions · Understands what evaluation can and cannot answer</text>

  <!-- Arrow right -->
  <path d="M590 400L630 400" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ========================================== -->
  <!-- BAND 4: PCP / Medical Home Gate -->
  <!-- ========================================== -->
  <text x="660" y="358" font-size="13" font-weight="700" fill="#334155">Band 4 — PCP / Medical Home Gate</text>

  <rect x="630" y="370" width="390" height="60" rx="8" fill="#a7f3d0" stroke="#34d399" stroke-width="1.2"/>
  <text x="825" y="392" font-size="15" font-weight="650" fill="#1e293b" text-anchor="middle">PCP / Medical Home Review</text>
  <text x="825" y="410" font-size="12" fill="#475569" text-anchor="middle">PCP reviews concern and records</text>

  <!-- Down arrows -->
  <path d="M310 430L310 455" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M825 430L825 455" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>

  <path d="M30 450L1050 450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 4" fill="none"/>

  <!-- ========================================== -->
  <!-- OUTCOMES ROW -->
  <!-- ========================================== -->
  <text x="30" y="470" font-size="13" font-weight="700" fill="#334155">Outcomes</text>

  <!-- Eval Prep -->
  <rect x="30" y="483" width="300" height="55" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.2"/>
  <text x="180" y="505" font-size="14" font-weight="650" fill="#166534" text-anchor="middle">Evaluation Prep</text>
  <text x="180" y="523" font-size="11" fill="#475569" text-anchor="middle">If appropriate + within capacity</text>
  <text x="180" y="535" font-size="10" fill="#16a34a" text-anchor="middle">Schedule clinical evaluation</text>

  <!-- Support Planning -->
  <rect x="355" y="483" width="300" height="55" rx="8" fill="#fce7f3" stroke="#f472b6" stroke-width="1.2"/>
  <text x="505" y="505" font-size="14" font-weight="650" fill="#9d174d" text-anchor="middle">Support Planning</text>
  <text x="505" y="523" font-size="11" fill="#475569" text-anchor="middle">Alternate resource guidance</text>
  <text x="505" y="535" font-size="10" fill="#9d174d" text-anchor="middle">Return to record gathering if needed</text>

  <!-- Connect Medical Home -->
  <rect x="680" y="483" width="285" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="822" y="505" font-size="14" font-weight="650" fill="#92400e" text-anchor="middle">Connect to Medical Home</text>
  <text x="822" y="523" font-size="11" fill="#475569" text-anchor="middle">If no PCP connected</text>
  <text x="822" y="535" font-size="10" fill="#92400e" text-anchor="middle">Re-enter at PCP Review</text>

  <!-- ========================================== -->
  <!-- EMERGENCY SIDE CALLOUT -->
  <!-- ========================================== -->
  <rect x="30" y="558" width="1080" height="0" fill="none"/>

  <!-- Emergency in its own row -->
  <rect x="30" y="565" width="240" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="150" y="585" font-size="13" font-weight="700" fill="#b45309" text-anchor="middle">Emergency / Immediate Danger?</text>
  <text x="150" y="601" font-size="11" fill="#16a34a" text-anchor="middle">No → continue pathways above</text>

  <!-- Yes arrow -->
  <path d="M270 590L300 590" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="278" y="583" font-size="11" font-weight="700" fill="#dc2626">Yes</text>

  <rect x="305" y="565" width="200" height="50" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.2"/>
  <text x="405" y="588" font-size="15" font-weight="700" fill="#991b1b" text-anchor="middle">Call 988 / 911</text>
  <text x="405" y="605" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">Emergency Pathway</text>

  <path d="M30 635L1050 635" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 4" fill="none"/>

  <!-- ========================================== -->
  <!-- KEY CONCEPT -->
  <!-- ========================================== -->
  <rect x="30" y="650" width="980" height="35" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="50" y="668" font-size="11" fill="#1e40af" font-weight="500">This workflow supports early recognition, family education, and preparation for PCP discussion or evaluation readiness.</text>
  <text x="50" y="682" font-size="11" fill="#1e40af" font-weight="500">It does not create an open referral channel. No diagnosis by entry-point staff. PCP is the clinical gatekeeper.</text>

  <!-- ========================================== -->
  <!-- BOUNDARY BOX -->
  <!-- ========================================== -->
  <rect x="30" y="700" width="980" height="120" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="50" y="722" font-size="14" font-weight="700" fill="#991b1b">Boundary Box</text>
  <g font-size="11" fill="#991b1b">
    <text x="50" y="742">No PHI  |  No open referral channel</text>
    <text x="50" y="759">No diagnosis by WIC / school / public health staff  |  No diagnosis by CHWs / navigators</text>
    <text x="50" y="776">No Holly endorsement implied  |  No Contentnea approval implied  |  No Proof Alliance endorsement implied</text>
    <text x="50" y="793">No DSS / court pathway  |  Richard approval required before sharing</text>
    <text x="50" y="812" font-weight="700">Internal draft only  |  Not for external distribution  |  Non-PHI</text>
  </g>
</svg>
