<head>
  <meta charset="UTF-8" />

  <title>Trillium Health — 合作推进面板</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Simple config -->
  <script>
    // Immediate test - run as soon as script loads
    console.log("=== ADD DOCUMENT BUTTON TEST ===");
    
    // Test 1: Check if button exists in HTML (before DOM is ready)
    if (htmlContains('添加文档')) {
      console.log("✓ Button text found in HTML");
    } else {
      console.error("✗ Button text NOT found in HTML");
    }
    
    if (htmlContains('add-document-btn')) {
      console.log("✓ Button ID found in HTML");
    } else {
      console.error("✗ Button ID NOT found in HTML");
    }
    
    // Helper function to check HTML content
    function htmlContains(text) {
      return document.documentElement.innerHTML.indexOf(text) !== -1;
    }
    
    // Test 2: Simulate click after short delay
    setTimeout(function() {
      console.log("Testing button simulation...");
      const btn = document.getElementById('add-document-btn') || 
                  document.querySelector('[data-add-doc="true"]');
      
      if (btn) {
        console.log("✓ Button found in DOM, simulating click");
        // Create and dispatch click event
        const clickEvent = new MouseEvent('click', {
          view: window,
          bubbles: true,
          cancelable: true
        });
        btn.dispatchEvent(clickEvent);
      } else {
        console.error("✗ Button NOT found in DOM for simulation");
      }
    }, 500);

    // ==================================================
    // 🔧 SIMPLE FIX: Add Document Button Handler
    // ==================================================
    
    // Direct button click handler
    function handleAddDocumentClick() {
      console.log("Add doc clicked - SIMPLE FIX");
      
      // Try to call existing function
      if (typeof showAddDocumentModal === 'function') {
        showAddDocumentModal();
        return;
      }
      
      // Fallback: show alert
      alert("UI not connected - 无法打开添加文档窗口");
    }
    
    // Bind click handler on DOM ready
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM loaded - binding add document button');
      
      // Method 1: Use data attribute
      const buttonByData = document.querySelector('[data-add-doc="true"]');
      if (buttonByData) {
        console.log('Found button by data-add-doc');
        buttonByData.addEventListener('click', handleAddDocumentClick);
      }
      
      // Method 2: Use button text
      const buttons = document.querySelectorAll('button');
      for (const btn of buttons) {
        if (btn.textContent.includes('添加文档')) {
          console.log('Found button by text "添加文档"');
          btn.addEventListener('click', handleAddDocumentClick);
          break;
        }
      }
      
      // Method 3: Direct ID
      const buttonById = document.getElementById('add-document-btn');
      if (buttonById) {
        console.log('Found button by ID add-document-btn');
        buttonById.addEventListener('click', handleAddDocumentClick);
      }
      
      // Fail-safe check
      setTimeout(function() {
        const anyButton = document.querySelector('[data-add-doc="true"]') || 
                         document.getElementById('add-document-btn');
        if (!anyButton) {
          console.error('Add document button not found in DOM');
        } else {
          console.log('Button binding complete:', anyButton);
        }
      }, 100);
    });

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#0ea5e9",
            urgent: "#ef4444",
            warning: "#f59e0b",
            neutral: "#6b7280",
            completed: "#10b981"
          }
        }
      }
    }
  
    // Global error handler for debugging
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.message, 'at', e.filename, 'line', e.lineno);
      showNotification('JavaScript错误: ' + e.message, 'error');
    });
</script>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Theme Variables */
    :root {
      --bg-color: #ffffff;
      --card-bg: #f5f5f5;
      --text-primary: #111111;
      --text-secondary: #4b5563;
      --accent: #0ea5e9;
      --border: #e5e7eb;
      --hover-bg: rgba(0, 0, 0, 0.02);
      --input-bg: #ffffff;
      --input-text: #111111;
      --input-border: #d1d5db;
    }

    /* Multi-Color Accent System */
    :root {
      --accent-orange: #f59e0b;
      --accent-blue: #60a5fa;
      --accent-green: #34d399;
      --accent-purple: #a78bfa;
    }

    /* Dark Mode - High Contrast with Multi-Color Accents */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0b0f14;
        --card-bg: #121821;
        --modal-bg: #1e2632;
        --text-primary: #e6edf3;
        --text-secondary: #9fb0c3; /* Restore original secondary color */
        --accent: var(--accent-blue); /* Use accent-blue for accent */
        --border: #2a3441;
        --hover-bg: rgba(255, 255, 255, 0.08);
        --input-bg: #1a2230;
        --input-text: #e6edf3;
        --input-border: #475569;
      }

      /* Main text - softer contrast */
      body, p, li, div, span {
        color: #e6edf3 !important;
      }

      /* Headings - brighter contrast */
      h1, h2, h3, h4, h5, h6,
      .text-gray-900, .text-gray-800, .text-gray-700,
      .font-bold, .font-semibold, .font-medium {
        color: #f0f6fc !important;
      }

      /* Apply multi-color accent rules */
      
      /* Orange: status, priority labels */
      .status-badge,
      .priority-badge,
      .text-orange-500,
      .text-yellow-600,
      .text-warning {
        color: var(--accent-orange) !important;
      }
      
      /* Blue: links, sources */
      a, .text-blue-600, .hover\\:text-brand:hover,
      .text-brand, .source-link,
      .text-link {
        color: var(--accent-blue) !important;
      }
      
      /* Green: executable, next actions, readiness */
      .text-green-600, .text-green-500,
      .text-completed, .text-executable,
      .next-action {
        color: var(--accent-green) !important;
      }
      
      /* Purple: academic references, stakeholders, Yale/Harvard */
      .text-purple-500, .text-purple-600,
      .academic-ref, .stakeholder-tag,
      .yale-mention, .harvard-mention {
        color: var(--accent-purple) !important;
      }
      
      /* Restore secondary text to original color */
      .text-gray-600, .text-gray-500, .text-gray-400,
      .source-link, [class*="timestamp"], .text-xs {
        color: var(--text-secondary) !important;
      }

      /* Links */
      a, .text-blue-600, .hover\\:text-brand:hover,
      .source-link, .text-brand {
        color: #4ea1ff !important;
      }

      /* Force high contrast for modal */
      .modal, #ppt-modal .bg-white {
        background: var(--modal-bg) !important;
      }

      /* PPT modal text hierarchy */
      .slide {
        color: #e6edf3;
      }

      .slide p, .slide li, .slide div, .slide span {
        color: #e6edf3;
      }

      .slide h1, .slide h2, .slide h3,
      .slide h4, .slide h5, .slide h6 {
        color: #f0f6fc;
      }

      .slide .text-gray-600, .slide .text-gray-500,
      .slide .text-gray-400, .slide .text-xs {
        color: #9fb0c3;
      }

      /* Ensure body stays dark */
      body {
        background: var(--bg-color) !important;
      }

      /* Improve card separation */
      .card, .bg-card, .execution-card, .ai-suggestion, .human-input {
        background: var(--card-bg) !important;
        border: 1px solid var(--border) !important;
      }
    }

    /* Apply Theme Variables */
    body {
      background: var(--bg-color);
      color: var(--text-primary);
    }

    /* Card and Container Styles */
    .card, .modal, .ai-suggestion, .human-input, 
    .bg-card, .execution-card, .slide,
    header, .shadow, .shadow-sm, .shadow-xl {
      background: var(--card-bg);
      border: 1px solid var(--border);
    }

    /* Remove default borders for specific elements */
    header, .shadow, .shadow-sm, .shadow-xl {
      border: none;
    }

    /* Text Hierarchy */
    .text-gray-600, .text-gray-500, .text-gray-400,
    .text-gray-700, .text-gray-800, .text-gray-900 {
      color: var(--text-secondary);
    }

    /* Primary Text */
    .text-gray-900, h1, h2, h3, h4, h5, h6,
    .font-bold, .font-semibold, .font-medium {
      color: var(--text-primary);
    }

    /* Links */
    a, .source-link, .text-blue-600, .hover\\:text-brand:hover {
      color: var(--accent);
    }

    .source-link:hover {
      color: var(--accent);
      opacity: 0.8;
    }

    /* Borders */
    .border, .border-b, .border-t, .border-l, .border-r {
      border-color: var(--border);
    }

    /* Inputs */
    textarea, input[type="text"], input[type="email"], 
    input[type="checkbox"] + span {
      background: var(--input-bg);
      color: var(--input-text);
      border-color: var(--input-border);
    }

    textarea::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* Buttons */
    button, .bg-brand {
      background-color: var(--accent);
      color: white;
    }

    button:hover, .bg-brand:hover {
      background-color: var(--accent);
      opacity: 0.9;
    }

    /* Checkbox Labels */
    .action-checkbox:checked + span {
      color: var(--text-secondary);
    }

    /* Execution Card Hover */
    .execution-card:hover {
      background: var(--hover-bg);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Original Styles */
    .execution-card {
      border-left: 4px solid #0ea5e9;
      transition: all 0.2s ease;
    }
    .execution-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    .status-badge {
      font-size: 0.7rem;
      padding: 0.1rem 0.5rem;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .action-checkbox:checked + span {
      text-decoration: line-through;
      color: #9ca3af;
    }
    .ai-suggestion {
      background-color: #f0f9ff;
      border-left: 4px solid #0ea5e9;
    }
    .human-input {
      background-color: #fefce8;
      border-left: 4px solid #f59e0b;
    }
    .source-link {
      font-size: 0.7rem;
      color: #6b7280;
      text-decoration: none;
    }
    .source-link:hover {
      color: #0ea5e9;
      text-decoration: underline;
    }
    
    /* Document Panel Styles */
    .document-item {
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      background: var(--card-bg);
      transition: all 0.2s ease;
    }
    
    .document-item:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    
    .document-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    
    .document-description {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }
    
    .document-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .document-btn {
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }
    
    .document-btn-primary {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .document-btn-primary:hover {
      background-color: #0284c7;
      border-color: #0284c7;
    }
    
    .document-btn-secondary {
      background-color: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    
    .document-btn-secondary:hover {
      background-color: var(--hover-bg);
      border-color: var(--text-secondary);
    }
    
    .document-delete-btn {
      margin-left: auto;
      color: #ef4444;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
    }
    
    .document-delete-btn:hover {
      background-color: rgba(239, 68, 68, 0.1);
    }
    
    /* Modal Styles */
    .document-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .document-modal.active {
      opacity: 1;
      visibility: visible;
    }
    
    .document-modal-content {
      background: var(--card-bg);
      border-radius: 0.75rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transform: translateY(-20px);
      transition: transform 0.3s ease;
    }
    
    .document-modal.active .document-modal-content {
      transform: translateY(0);
    }
    
    .document-modal h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    
    .document-modal input,
    .document-modal textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      background: var(--input-bg);
      color: var(--input-text);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    
    .document-modal textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .document-modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    
    .document-modal-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
    }
    
    .document-modal-btn-primary {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .document-modal-btn-primary:hover {
      background-color: #0284c7;
    }
    
    .document-modal-btn-secondary {
      background-color: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    
    .document-modal-btn-secondary:hover {
      background-color: var(--hover-bg);
    }
  </style>
</head>

  <script>
    // Set current date and time
    const now = new Date();
    document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN');
    document.getElementById('update-time').textContent = now.toLocaleString('zh-CN');
    
    // Handle checkbox interactions
    document.querySelectorAll('.action-checkbox').forEach(checkbox => {
      checkbox.addEventListener('change', function() {
        const label = this.nextElementSibling.querySelector('span.text-gray-800');
        if (this.checked) {
          label.classList.add('line-through', 'text-gray-400');
        } else {

    // Copy to clipboard function
    function copyToClipboard(elementId) {
      const element = document.getElementById(elementId);
      let text = '';
      
      if (elementId === 'extended-text') {

        const paragraphs = element.querySelectorAll('p');
        text = Array.from(paragraphs).map(p => p.textContent).join('\n');
      } else {
        text = element.textContent || element.innerText;
      }
      
      navigator.clipboard.writeText(text).then(() => {
        showBioNotification('已复制到剪贴板', 'success');

        showBioNotification('复制失败，请手动选择文本', 'error');

    // Regenerate bio function
    function regenerateBio() {
      const emphasisInput = document.getElementById('emphasis-input').value.toLowerCase().trim();
      
      // Get random templates
      const oneLinerIndex = Math.floor(Math.random() * bioTemplates.oneLiner.length);
      const standardIndex = Math.floor(Math.random() * bioTemplates.standard.length);
      const extendedIndex = Math.floor(Math.random() * bioTemplates.extended.length);
      
      let oneLiner = bioTemplates.oneLiner[oneLinerIndex];
      let standard = bioTemplates.standard[standardIndex];
      let extended = bioTemplates.extended[extendedIndex];
      
      // Apply emphasis if specified
      if (emphasisInput) {
        const keywords = emphasisInput.split(/[,\s]+/);
        
        keywords.forEach(keyword => {
          if (emphasisKeywords[keyword]) {
            if (emphasisKeywords[keyword].oneLiner) {
              oneLiner = emphasisKeywords[keyword].oneLiner;
            }
            if (emphasisKeywords[keyword].standard) {
              standard = emphasisKeywords[keyword].standard;
            }
            if (emphasisKeywords[keyword].clinical) {
              extended.clinical = emphasisKeywords[keyword].clinical;
            }
            if (emphasisKeywords[keyword].implementation) {
              extended.implementation = emphasisKeywords[keyword].implementation;
            }
            if (emphasisKeywords[keyword].impact) {
              extended.impact = emphasisKeywords[keyword].impact;
            }
          }
        });
      }
      
      // Update DOM
      document.getElementById('one-liner-text').textContent = oneLiner;
      document.getElementById('standard-text').textContent = standard;
      
      const extendedElement = document.getElementById('extended-text');
      extendedElement.innerHTML = `
        <p>• <strong>Clinical Pathway Framing</strong>: ${extended.clinical}</p>
        <p>• <strong>Implementation Setting</strong>: ${extended.implementation}</p>
        <p>• <strong>Expected Impact</strong>: ${extended.impact}</p>
        <p>• <strong>Academic Calibration</strong>: ${extended.academic}</p>
      `;
      
      showBioNotification('定位已重新生成', 'success');
    }

      // Create notification element
      const notification = document.createElement('div');
      notification.className = `fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg max-w-sm ${
        type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' :
        type === 'error' ? 'bg-red-100 text-red-800 border border-red-200' :
        type === 'warning' ? 'bg-yellow-100 text-yellow-800 border border-yellow-200' :
        'bg-blue-100 text-blue-800 border border-blue-200'
      }`;
      
      notification.innerHTML = `
        <div class="flex items-center">
          <i class="fas ${
            type === 'success' ? 'fa-check-circle' :
            type === 'error' ? 'fa-exclamation-circle' :
            type === 'warning' ? 'fa-exclamation-triangle' :
            'fa-info-circle'
          } mr-2"></i>
          <span>${message}</span>
        </div>
      `;
      
      // Add to body
      document.body.appendChild(notification);
      
      // Remove after 3 seconds
      setTimeout(() => {
        notification.style.opacity = '0';
        notification.style.transition = 'opacity 0.5s';
        setTimeout(() => {
          if (notification.parentNode) {
            notification.parentNode.removeChild(notification);
          }
        }, 500);
      }, 3000);
    }

    // Load documents from localStorage or use defaults
    function loadDocuments() {
      try {
        const saved = localStorage.getItem('trillium_documents');
        if (saved) {
          return JSON.parse(saved);
        }
      } catch (e) {
        console.error('Failed to load documents:', e);
      }
      return defaultDocuments;

    // Save documents to localStorage
    function saveDocuments(documents) {
      try {
        localStorage.setItem('trillium_documents', JSON.stringify(documents));
      } catch (e) {
        console.error('Failed to save documents:', e);
      }
    }

    // Render document list
    function renderDocumentList() {
      const container = document.getElementById('document-list');
      if (!container) return;
      
      const documents = loadDocuments();
      
      if (documents.length === 0) {
        container.innerHTML = `
          <div class="text-center py-6 text-gray-500">
            <i class="fas fa-folder-open text-3xl mb-2"></i>
            <p>暂无文档</p>
            <p class="text-sm mt-1">点击"添加文档"按钮添加第一个文档</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = documents.map(doc => `
        <div class="document-item" data-doc-id="${doc.id}">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <div class="document-title">${escapeHtml(doc.title)}</div>
              <div class="document-description">${escapeHtml(doc.description)}</div>
              <div class="document-actions">
                <button 
                  class="document-btn document-btn-primary"
                  onclick="openDocument('${escapeHtml(doc.url)}')"
                >
                  <i class="fas fa-external-link-alt mr-1"></i> Open
                </button>
                <button 
                  class="document-btn document-btn-secondary"
                  onclick="copyDocumentLink('${escapeHtml(doc.url)}', '${escapeHtml(doc.title)}')"

                  <i class="fas fa-copy mr-1"></i> Copy link

              </div>
            </div>
            <button

    // Get document icon based on type
    function getDocumentIcon(type) {
      const icons = {
        'google-doc': 'file-word',
        'pdf': 'file-pdf',
        'google-sheet': 'file-excel',
        'link': 'link',
        'default': 'file'
      };
      return icons[type] || icons.default;
    }

    // Get document type label
    function getDocumentTypeLabel(type) {
      const labels = {
        'google-doc': 'Google Doc',
        'pdf': 'PDF',
        'google-sheet': 'Google Sheet',
        'link': 'Link',
        'default': 'Document'
      };
      return labels[type] || labels.default;
    }

    // Open document in new tab
    function openDocument(url) {
      if (url && url.startsWith('http')) {
        window.open(url, '_blank');
        showNotification('文档已在新标签页打开', 'info');
      } else {
        showNotification('无效的文档链接', 'error');
      }
    }

    // Copy document link to clipboard
    function copyDocumentLink(url, title) {
      if (!url) {
        showNotification('无链接可复制', 'error');
        return;
      }
      
      navigator.clipboard.writeText(url).then(() => {
        showNotification(`"${title}" 链接已复制到剪贴板`, 'success');
      }).catch(err => {
        console.error('复制失败:', err);
        showNotification('复制失败，请手动复制链接', 'error');
      });
    }

    // Delete document
    function deleteDocument(id) {
      if (!confirm('确定要删除这个文档吗？')) return;
      
      const documents = loadDocuments();
      const filtered = documents.filter(doc => doc.id !== id);
      saveDocuments(filtered);
      renderDocumentList();
      showNotification('文档已删除', 'success');
    }

    // Add new document
    function addNewDocument() {
      console.log(\'addNewDocument called\');
      const title = document.getElementById('doc-title').value.trim();
      const description = document.getElementById('doc-description').value.trim();
      const url = document.getElementById('doc-url').value.trim();
      const type = document.getElementById('doc-type').value;
      
      if (!title) {
        showNotification('请输入文档标题', 'error');
        return;
      }
      
      if (!url) {
        showNotification('请输入文档链接', 'error');
        return;
      }
      
      // Validate URL format
      try {
        new URL(url);
      } catch (e) {
        showNotification('请输入有效的链接地址', 'error');
        return;
      }
      
      const documents = loadDocuments();
      const newId = documents.length > 0 ? Math.max(...documents.map(d => d.id)) + 1 : 1;
      
      documents.push({
        id: newId,
        title,
        description: description || '无描述',
        url,
        type
      });
      
      saveDocuments(documents);
      renderDocumentList();
      hideAddDocumentModal();
      showNotification('文档已添加', 'success');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
