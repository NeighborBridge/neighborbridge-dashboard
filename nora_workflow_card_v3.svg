<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 830" width="1000" height="830" xmlns="http://www.w3.org/2000/svg" style="font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f7fb;">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#64748b"/>
    </marker>
    <marker id="ad" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 0L5 10z" fill="#64748b"/>
    </marker>
    <marker id="aup" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 10L10 10L5 0z" fill="#64748b"/>
    </marker>
    <marker id="ared" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="830" fill="#f4f7fb" rx="8"/>

  <!-- Title block -->
  <text x="30" y="35" font-size="19" font-weight="700" fill="#0f172a">FASD/NDD Diagnostic Readiness — Community Entry-Point Workflow</text>
  <text x="30" y="55" font-size="12" fill="#64748b" font-style="italic">Internal concept for Holly / FQHC alignment discussion — not sent / not approved</text>

  <!-- Status badges -->
  <rect x="30" y="68" width="80" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="70" y="83" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">Internal Draft</text>
  <rect x="118" y="68" width="66" height="22" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.5"/>
  <text x="151" y="83" font-size="10" font-weight="700" fill="#4338ca" text-anchor="middle">Non-PHI</text>
  <rect x="192" y="68" width="140" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="262" y="83" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">Not for external distribution</text>
  <rect x="340" y="68" width="130" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="405" y="83" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">No referral pathway implied</text>

  <!-- ===== SECTION: ENTRY POINTS (horizontal row) ===== -->
  <text x="30" y="120" font-size="13" font-weight="700" fill="#334155">Community Entry Points</text>

  <rect x="30" y="133" width="160" height="48" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="110" y="153" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">🆔 WIC</text>
  <text x="110" y="170" font-size="11" fill="#475569" text-anchor="middle">Notices concern</text>

  <rect x="205" y="133" width="160" height="48" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="285" y="153" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">🏥 Public Health</text>
  <text x="285" y="170" font-size="11" fill="#475569" text-anchor="middle">Care managers</text>

  <rect x="380" y="133" width="160" height="48" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="460" y="153" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">🏫 School Nurses</text>
  <text x="460" y="170" font-size="11" fill="#475569" text-anchor="middle">Notices concern</text>

  <rect x="555" y="133" width="160" height="48" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="635" y="153" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">👶 Pediatric PCP</text>
  <text x="635" y="170" font-size="11" fill="#475569" text-anchor="middle">Child health clinic</text>

  <rect x="730" y="133" width="175" height="48" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="817" y="153" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">🧑‍🤝‍🧑 CHW / Navigator</text>
  <text x="817" y="170" font-size="11" fill="#475569" text-anchor="middle">Pending approval</text>

  <!-- Arrow: any entry point → concern noticed → pathway -->
  <path d="M110 181L110 210" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M285 181L285 210" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M460 181L460 210" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M635 181L635 210" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <path d="M817 181L817 210" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>

  <!-- Horizontal line connecting all entry point flows -->
  <path d="M30 220L960 220" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 4" fill="none"/>

  <!-- ===== SECTION: MAIN PATHWAY (5 steps horizontal) ===== -->
  <text x="30" y="252" font-size="13" font-weight="700" fill="#334155">Main Care Pathway</text>

  <!-- Step 1 -->
  <rect x="30" y="268" width="155" height="50" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="107" y="289" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">1. Concern Noticed</text>
  <text x="107" y="306" font-size="11" fill="#475569" text-anchor="middle">By entry point staff</text>
  <path d="M185 293L210 293" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="215" y="268" width="155" height="50" rx="6" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.2"/>
  <text x="292" y="289" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">2. Readiness</text>
  <text x="292" y="306" font-size="11" fill="#475569" text-anchor="middle">Diagnostic education</text>
  <path d="M370 293L395 293" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="400" y="268" width="155" height="50" rx="6" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.2"/>
  <text x="477" y="289" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">3. Record Gathering</text>
  <text x="477" y="306" font-size="11" fill="#475569" text-anchor="middle">Family prepares</text>
  <path d="M555 293L580 293" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="585" y="268" width="155" height="50" rx="6" fill="#a7f3d0" stroke="#34d399" stroke-width="1.2"/>
  <text x="662" y="289" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">4. PCP / Medical</text>
  <text x="662" y="306" font-size="11" fill="#475569" text-anchor="middle">Home Review</text>
  <path d="M740 293L765 293" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="770" y="268" width="155" height="50" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.2"/>
  <text x="847" y="289" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">5. Eval Prep or</text>
  <text x="847" y="306" font-size="11" fill="#475569" text-anchor="middle">Support Planning</text>

  <!-- Arrow from Step 2/3 to Gate 2 -->
  <path d="M477 318L477 378" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#aup)"/>

  <!-- === DECISION GATES ROW === -->
  <text x="30" y="360" font-size="13" font-weight="700" fill="#334155">Decision Gates</text>

  <!-- ===== GATE 1: Emergency? (compact, right side) ===== -->
  <!-- Gate 1: compact, linked to Step 1 area -->
  <path d="M107 318L107 378" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#aup)"/>

  <rect x="30" y="378" width="255" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="157" y="398" font-size="14" font-weight="700" fill="#b45309" text-anchor="middle">🔴 Gate 1: Emergency / Immediate Danger?</text>
  <text x="157" y="418" font-size="13" fill="#16a34a" text-anchor="middle">No → continue readiness pathway</text>

  <!-- Yes arrow: emergency box side panel -->
  <path d="M285 395L325 395" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ared)"/>
  <text x="295" y="388" font-size="12" font-weight="700" fill="#dc2626">Yes</text>

  <!-- Emergency side box -->
  <rect x="330" y="378" width="170" height="60" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.2"/>
  <text x="415" y="400" font-size="14" font-weight="700" fill="#991b1b" text-anchor="middle">🚨 988 / 911</text>
  <text x="415" y="420" font-size="13" font-weight="600" fill="#b91c1c" text-anchor="middle">Emergency Pathway</text>

  <!-- ===== GATE 2: PCP Connected ===== -->
  <rect x="340" y="440" width="260" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="470" y="462" font-size="15" font-weight="700" fill="#b45309" text-anchor="middle">🟡 Gate 2: PCP Connected?</text>
  <text x="470" y="483" font-size="13" fill="#16a34a" text-anchor="middle">Yes → PCP review Continue</text>
  <text x="470" y="500" font-size="13" fill="#dc2626" text-anchor="middle">No → Connect to medical home</text>

  <!-- No arrow down -->
  <path d="M470 510L470 540" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <text x="482" y="530" font-size="12" font-weight="700" fill="#dc2626">No</text>

  <!-- Connect to Medical Home box -->
  <rect x="370" y="540" width="200" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="470" y="558" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">🏥 Connect to Medical Home</text>
  <text x="470" y="573" font-size="11" fill="#475569" text-anchor="middle">Then re-enter pathway at PCP review</text>

  <!-- ===== GATE 3: Ready for Clinical Eval? ===== -->
  <rect x="650" y="440" width="260" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="780" y="462" font-size="15" font-weight="700" fill="#b45309" text-anchor="middle">🟢 Gate 3: Ready for Clinical Eval?</text>
  <text x="780" y="483" font-size="13" fill="#16a34a" text-anchor="middle">Yes + within approved capacity → Schedule</text>
  <text x="780" y="500" font-size="13" fill="#dc2626" text-anchor="middle">No → Support planning / record gathering</text>

  <!-- Arrow from Step 4/5 to Gate 3 -->
  <path d="M847 318L847 440" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#aup)"/>

  <!-- Outcome boxes row (aligned below gates) -->

  <!-- Gate 3: Yes → Clinical Evaluation -->
  <path d="M780 510L780 540" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>
  <text x="792" y="530" font-size="12" font-weight="700" fill="#16a34a">Yes</text>
  <rect x="690" y="540" width="200" height="40" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.2"/>
  <text x="790" y="558" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">✔ Clinical Evaluation</text>
  <text x="790" y="573" font-size="11" fill="#475569" text-anchor="middle">Within approved workflow</text>

  <!-- Gate 3: No → Support Planning -->
  <path d="M650 475L160 556" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="220" y="530" font-size="12" font-weight="700" fill="#dc2626">No</text>

  <rect x="50" y="540" width="250" height="40" rx="6" fill="#fce7f3" stroke="#f472b6" stroke-width="1.2"/>
  <text x="175" y="558" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">📝 Support Planning</text>
  <text x="175" y="573" font-size="11" fill="#475569" text-anchor="middle">Alternate resource guidance</text>

  <text x="50" y="575" font-size="0" fill="transparent"> </text>

  <!-- Clinical Eval → Longitudinal Support -->
  <rect x="690" y="600" width="200" height="40" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.2"/>
  <text x="790" y="618" font-size="13" font-weight="650" fill="#1e293b" text-anchor="middle">🔄 Longitudinal Support</text>
  <text x="790" y="633" font-size="11" fill="#475569" text-anchor="middle">Family support planning</text>
  <path d="M890 580L890 600" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ad)"/>

  <!-- ===== Key Concept box ===== -->
  <rect x="30" y="660" width="910" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="50" y="678" font-size="12" fill="#1e40af" font-weight="500">This workflow supports early recognition, family education, and referral preparation.</text>
  <text x="50" y="694" font-size="12" fill="#1e40af" font-weight="500">It does not create an open referral channel. No diagnosis by entry-point staff.</text>

  <!-- ===== BOUNDARY BOX ===== -->
  <rect x="30" y="715" width="910" height="100" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="50" y="738" font-size="15" font-weight="700" fill="#991b1b">⚠ Boundary Box</text>
  <g font-size="12" fill="#991b1b">
    <text x="50" y="758">• No PHI                  • No open referral channel</text>
    <text x="50" y="775">• No diagnosis by WIC / school / public health staff    • No diagnosis by CHWs / navigators</text>
    <text x="50" y="792">• No Holly endorsement implied    • No Contentnea approval implied  • No Proof Alliance endorsement implied</text>
    <text x="50" y="809">• No DSS / court pathway  • Richard approval required before sharing</text>
  </g>
</svg>
