  <path d="M255 262L315 262" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <rect x="315" y="235" width="210" height="55" rx="6" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.2"/>
  <text x="420" y="257" font-size="12.5" font-weight="650" fill="#1e293b" text-anchor="middle">📋 Record Gathering</text>
