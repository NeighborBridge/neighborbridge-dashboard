  <text x="14" y="260" font-size="12" font-weight="700" fill="#475569" text-anchor="end">Family Readiness Preparation</text>
  <text x="14" y="395" font-size="12" font-weight="700" fill="#475569" text-anchor="end">PCP / Medical Home</text>
  <text x="14" y="530" font-size="12" font-weight="700" fill="#475569" text-anchor="end">Clinical Eval &amp; Support</text>
  <text x="14" y="660" font-size="12" font-weight="700" fill="#475569" text-anchor="end">Safety Escalation</text>

  <!-- Swimlane borders -->
  <rect x="28" y="95" width="944" height="115" rx="5" fill="none" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="28" y="220" width="944" height="125" rx="5" fill="none" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="28" y="355" width="944" height="125" rx="5" fill="none" stroke="#cbd5e1" stroke-width="1.2"/>
