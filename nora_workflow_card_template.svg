  <rect x="120" y="65" width="60" height="20" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.5"/>
  <text x="150" y="79" font-size="10" font-weight="700" fill="#4338ca" text-anchor="middle">Non-PHI</text>
  <rect x="186" y="65" width="130" height="20" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="251" y="79" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">Not for external distribution</text>
