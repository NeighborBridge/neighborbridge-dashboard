  <rect x="28" y="625" width="944" height="70" rx="5" fill="none" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- Lane 1: Community Entry Points -->
  <!-- WIC -->
  <rect x="45" y="110" width="145" height="55" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="117" y="133" font-size="12.5" font-weight="650" fill="#1e293b" text-anchor="middle">🆔 WIC</text>
  <text x="117" y="150" font-size="11" fill="#475569" text-anchor="middle">Entry point</text>

  <!-- Public Health -->
  <rect x="210" y="110" width="150" height="55" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.2"/>
