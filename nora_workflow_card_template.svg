  <text x="787" y="150" font-size="11" fill="#475569" text-anchor="middle">Pending approval</text>

  <!-- Arrows Lane 1 → Lane 2 -->
  <path d="M117 165L117 235" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M285 165L285 235" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M452 165L452 235" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M617 165L617 235" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M787 165L787 235" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Lane 2: Family Readiness -->
  <rect x="45" y="235" width="210" height="55" rx="6" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.2"/>
  <text x="150" y="257" font-size="12.5" font-weight="650" fill="#1e293b" text-anchor="middle">📖 Diagnostic-Readiness</text>
